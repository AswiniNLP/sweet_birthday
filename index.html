<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    
    <!-- Animate.css for smooth entrance animations -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <!-- Canvas Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --primary-bg: #fdf2f8; /* Soft pink */
            --text-color: #374151;
            --accent-color: #db2777;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-color);
            overflow-x: hidden;
        }

        /* --- Landing Screen --- */
        #landing {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
            transition: opacity 1s ease-out;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.5rem;
            color: white;
            background-color: var(--accent-color);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(219, 39, 119, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(219, 39, 119, 0.4);
        }

        /* --- Main Content --- */
        #main-content {
            display: none;
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }

        h1 {
            font-size: 3.5rem;
            color: var(--accent-color);
            margin-bottom: 10px;
        }

        p.subtitle {
            font-size: 1.2rem;
            margin-bottom: 40px;
            color: #4b5563;
        }

        /* --- Photo Gallery Grid --- */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        .photo-card {
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .photo-card:hover {
            transform: scale(1.05);
        }

        .photo-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
        }

        /* --- Responsive Video --- */
        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 40px;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <!-- Audio Element (Hidden) -->
    <!-- Replace 'your-audio-file.mp3' with a link to a song, or keep it local in the GitHub repo -->
    <audio id="bg-music" src="your-audio-file.mp3"></audio>

    <!-- Landing Screen -->
    <div id="landing">
        <h2 class="animate__animated animate__fadeInDown" style="color: white; font-size: 2rem; margin-bottom: 30px;">
            I have something special for you...
        </h2>
        <button class="btn animate__animated animate__pulse animate__infinite" onclick="revealSurprise()">
            Click to Open
        </button>
    </div>

    <!-- Main Content -->
    <div id="main-content">
        <h1 class="animate__animated animate__bounceIn">Happy Birthday, My Love!</h1>
        <p class="subtitle animate__animated animate__fadeIn animate__delay-1s">
            Wishing you the most wonderful day. Here are some of my favorite memories with you.
        </p>

        <!-- Video Section (Optional) -->
        <!-- Replace the YouTube URL with your own Unlisted YouTube video or Google Drive iframe -->
        <div class="video-container animate__animated animate__fadeInUp animate__delay-1s">
            <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
        </div>

        <!-- Photo Gallery -->
        <div class="gallery">
            <div class="photo-card animate__animated animate__zoomIn animate__delay-2s">
                <!-- Add your image names here (e.g., photo1.jpg). Ensure they are in the same GitHub repo -->
                <img src="https://via.placeholder.com/400x300?text=Photo+1" alt="Memory 1">
            </div>
            <div class="photo-card animate__animated animate__zoomIn animate__delay-2s">
                <img src="https://via.placeholder.com/400x300?text=Photo+2" alt="Memory 2">
            </div>
            <div class="photo-card animate__animated animate__zoomIn animate__delay-2s">
                <img src="https://via.placeholder.com/400x300?text=Photo+3" alt="Memory 3">
            </div>
            <div class="photo-card animate__animated animate__zoomIn animate__delay-2s">
                <img src="https://via.placeholder.com/400x300?text=Photo+4" alt="Memory 4">
            </div>
        </div>
    </div>

    <script>
        function revealSurprise() {
            // 1. Play Music
            const music = document.getElementById('bg-music');
            music.play().catch(e => console.log("Audio autoplay blocked, but user interaction should allow it."));

            // 2. Trigger Confetti
            var duration = 3 * 1000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#db2777', '#fbc2eb', '#ffffff']
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#db2777', '#fbc2eb', '#ffffff']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());

            // 3. Hide landing screen and show main content
            const landing = document.getElementById('landing');
            const mainContent = document.getElementById('main-content');
            
            landing.style.opacity = '0';
            setTimeout(() => {
                landing.style.display = 'none';
                mainContent.style.display = 'block';
            }, 500); // Wait for fade out
        }
    </script>
</body>
</html>
