<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday To You</title>
    
    <!-- Animate.css for smooth entrance animations -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <!-- Canvas Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --primary-bg: #fdf2f8; /* Soft pink */
            --text-color: #374151;
            --accent-color: #db2777;
            --heart-color: #ec4899;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-color);
            overflow-x: hidden;
            width: 100%;
            height: 100%;
        }

        /* --- Continuous Floating Elements (Background) --- */
        #floating-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Let clicks pass through */
            z-index: 0; /* Behind everything */
            overflow: hidden;
        }

        .floating-item {
            position: absolute;
            bottom: -50px;
            font-size: 1.5rem;
            opacity: 0.8;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0.8;
            }
            100% {
                transform: translateY(-110vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* --- Landing Screen --- */
        #landing {
            position: relative;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
            transition: opacity 1s ease-out, visibility 1s ease-out;
            z-index: 10; /* Above the floating background */
        }

        .btn {
            padding: 18px 45px;
            font-size: 1.6rem;
            color: white;
            background-color: var(--accent-color);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(219, 39, 119, 0.4);
            transition: transform 0.2s, box-shadow 0.2s, background-color 0.3s;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            transform: translateY(-5px) scale(1.03);
            box-shadow: 0 15px 30px rgba(219, 39, 119, 0.5);
            background-color: #be185d;
        }

        /* Enhanced Pulse effect on the button */
        .btn.animate__pulse {
            animation-duration: 1.5s;
        }

        /* --- Main Content --- */
        #main-content {
            display: none;
            visibility: hidden;
            opacity: 0;
            max-width: 1000px;
            margin: 0 auto;
            padding: 60px 20px;
            text-align: center;
            position: relative;
            z-index: 10;
            transition: opacity 1s ease-in, visibility 1s ease-in;
        }

        #main-content.show {
            display: block;
            visibility: visible;
            opacity: 1;
        }

        h1 {
            font-size: 3.8rem;
            color: var(--accent-color);
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        p.subtitle {
            font-size: 1.3rem;
            margin-bottom: 50px;
            color: #4b5563;
        }

        /* --- Photo Gallery Grid --- */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 60px;
        }

        .photo-card {
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            background: white;
            padding: 10px;
        }

        .photo-card:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.15);
        }

        .photo-card img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            display: block;
            border-radius: 15px;
        }

        /* --- Responsive Video --- */
        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            margin-bottom: 50px;
            transition: transform 0.3s ease;
        }
        
        .video-container:hover {
            transform: scale(1.02);
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Romantic Footer */
        footer {
            margin-top: 40px;
            color: #6b7280;
            font-size: 1rem;
            padding-bottom: 20px;
        }
    </style>
</head>
<body>

    <!-- Continuous Floating Background Elements (Hearts, Cakes, Candles) -->
    <div id="floating-container"></div>

    <!-- Audio Element (Hidden) -->
    <!-- Replace 'your-audio-file.mp3' with a link to a song, or keep it local in the GitHub repo -->
    <audio id="bg-music" loop src="your-audio-file.mp3"></audio>

    <!-- Landing Screen -->
    <div id="landing">
        <h2 class="animate__animated animate__fadeInDown animate__slow" style="color: white; font-size: 2.2rem; margin-bottom: 35px; text-shadow: 1px 1px 3px rgba(0,0,0,0.2);">
            I have something special for you...
        </h2>
        <!-- The button pulses continuously until clicked -->
        <button class="btn animate__animated animate__pulse animate__infinite" onclick="revealSurprise()">
            Click to Open ❤
        </button>
    </div>

    <!-- Main Content -->
    <div id="main-content">
        <h1 class="animate__animated animate__heartBeat animate__delay-1s">Happy Birthday, My Love!</h1>
        <p class="subtitle animate__animated animate__fadeIn animate__delay-2s">
            Wishing you the most wonderful day filled with joy and love. Here are some of my favorite memories with you.
        </p>

        <!-- Video Section (Optional) -->
        <div class="video-container animate__animated animate__fadeInUp animate__delay-2s">
            <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
        </div>

        <!-- Photo Gallery -->
        <div class="gallery">
            <div class="photo-card animate__animated animate__zoomIn animate__delay-3s">
                <img src="https://via.placeholder.com/400x300?text=Photo+1" alt="Memory 1">
            </div>
            <div class="photo-card animate__animated animate__zoomIn animate__delay-3s">
                <img src="https://via.placeholder.com/400x300?text=Photo+2" alt="Memory 2">
            </div>
            <div class="photo-card animate__animated animate__zoomIn animate__delay-4s">
                <img src="https://via.placeholder.com/400x300?text=Photo+3" alt="Memory 3">
            </div>
            <div class="photo-card animate__animated animate__zoomIn animate__delay-4s">
                <img src="https://via.placeholder.com/400x300?text=Photo+4" alt="Memory 4">
            </div>
        </div>
        
        <footer class="animate__animated animate__fadeIn animate__delay-5s">
            Made with ❤ for the most special person.
        </footer>
    </div>

    <script>
        // --- 1. Continuous Floating Background Elements ---
        const container = document.getElementById('floating-container');
        // A mix of romantic and birthday emojis
        const items = ['❤', '💖', '🎂', '🕯️', '🎈', '✨', '🌹'];

        function createFloatingItem() {
            const item = document.createElement('div');
            item.classList.add('floating-item');
            
            // Randomly select an emoji
            item.innerText = items[Math.floor(Math.random() * items.length)];
            
            // Randomize starting position (horizontal), duration, and size
            item.style.left = Math.random() * 100 + 'vw';
            item.style.animationDuration = Math.random() * 10 + 10 + 's'; // Between 10 and 20 seconds
            item.style.fontSize = Math.random() * 1 + 1 + 'rem'; // Between 1 and 2 rem
            
            // Randomly assign a pink/red color variation to some items
            if (Math.random() > 0.5) {
                item.style.color = 'var(--heart-color)';
            } else if (Math.random() > 0.8) {
              item.style.color = '#f43f5e'; // rose-500
            }

            container.appendChild(item);

            // Remove the element after the animation finishes to keep the DOM clean
            setTimeout(() => {
                item.remove();
            }, 20000); // Must be longer than the maximum animation duration
        }

        // Create new floating items continuously
        setInterval(createFloatingItem, 400); // Add a new item every 400ms

        // Initial burst of items on load
        for (let i = 0; i < 20; i++) {
          setTimeout(createFloatingItem, i * 100);
        }

        // --- 2. Reveal Surprise Function ---
        function revealSurprise() {
            // A. Play Music
            const music = document.getElementById('bg-music');
            music.play().catch(e => console.log("Audio autoplay blocked, but user interaction allows it."));

            // B. Trigger Intense Confetti Burst
            var duration = 5 * 1000; // 5 seconds
            var end = Date.now() + duration;

            (function frame() {
                // Launch confetti from the left
                confetti({
                    particleCount: 7,
                    angle: 60,
                    spread: 70,
                    origin: { x: 0, y: 0.6 }, // Slightly lower starting point
                    colors: ['#db2777', '#fbc2eb', '#ffffff', '#ec4899']
                });
                // Launch confetti from the right
                confetti({
                    particleCount: 7,
                    angle: 120,
                    spread: 70,
                    origin: { x: 1, y: 0.6 }, // Slightly lower starting point
                    colors: ['#db2777', '#fbc2eb', '#ffffff', '#ec4899']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());

            // C. Transition: Hide landing, show main content
            const landing = document.getElementById('landing');
            const mainContent = document.getElementById('main-content');
            
            landing.style.opacity = '0';
            landing.style.visibility = 'hidden';
            
            // Add a small delay before showing content for the fade effect
            setTimeout(() => {
                landing.style.display = 'none';
                mainContent.classList.add('show');
            }, 600); // Slightly faster delay for smoother feeling
        }
    </script>
</body>
</html>
